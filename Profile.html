<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoLent Profile - Everything is Money</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            --accent-gradient: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            --neon-blue: #00e676;
            --neon-purple: #00e676;
            --neon-green: #00e676;
            --bg-dark: #0B111B;
            --bg-gradient: #0B111B;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --font-primary: 'Space Grotesk', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-secondary);
            background: #0B111B !important;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px 15px 100px;
        }

        /* Glassmorphism Styles */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Header */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--neon-green);
            object-fit: cover;
            padding: 3px;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar-image:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: var(--neon-green);
            border-radius: 50%;
            border: 3px solid var(--bg-dark);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .profile-info h1 {
            font-family: var(--font-primary);
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .profile-info p {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .badge-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.7rem;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge i { font-size: 0.8rem; }
        .badge.verified { color: var(--neon-blue); border-color: var(--neon-blue); }
        .badge.active { color: var(--neon-green); border-color: var(--neon-green); }

        .edit-profile-icon {
            position: absolute;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
        }
        .edit-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 5px;
            color: white;
            padding: 2px 8px;
            font-size: 0.9rem;
            width: 150px;
            outline: none;
        }
        .edit-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            padding: 5px;
        }
        .edit-btn:hover { color: var(--neon-blue); }

        /* Beautiful Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 200px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast::before {
            content: '✓';
            color: var(--neon-green);
            font-size: 1.2rem;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .toast span {
            font-family: var(--font-primary);
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #fff;
        }

        /* Account Info Section (Sheet View) */
        .info-list {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            margin-top: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .info-value {
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }
    </style>
</head>
<body>

        <div id="toast" class="toast">
        <span id="toastMsg"></span>
    </div>

    <div class="container">
        <!-- 1️⃣ Profile Header Card (Centered) -->
        <div class="glass-card" style="animation-delay: 0.1s;">
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <img src="https://i.ibb.co.com/mrmfDmqG/user.png" alt="User Avatar" class="avatar-image">
                    <div class="status-dot"></div>
                </div>
                <div class="profile-info">
                    <h1>Saimon Ahmed</h1>
                    <p>User ID: <span id="userIdText" style="color: var(--neon-blue); font-weight: 600;">#IOL-45829</span> <button class="copy-btn" onclick="copyToClipboard('#IOL-45829', false)"><i class="fas fa-copy"></i></button></p>
                    <div class="badge-row">
                        <span class="badge verified"><i class="fas fa-check-circle"></i> Verified User</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2️⃣ Account Information Section (Sheet View) -->
        <div class="glass-card" style="animation-delay: 0.2s;">
            <h2 class="section-title"><i class="fas fa-list-check"></i> Account Details</h2>
            <div class="info-list">
                <div class="info-item">
                    <span class="info-label">Email Address</span>
                    <span class="info-value">user***@gmail.com</span>
                </div>
        <div class="info-item">
            <span class="info-label">Member Since</span>
            <span class="info-value">12 Jan 2026</span>
        </div>
        <div class="info-item">
            <span class="info-label">Current Address</span>
            <span class="info-value">Dhaka, Bangladesh</span>
        </div>
        <div class="info-item">
            <span class="info-label">Full Name</span>
            <span class="info-value">
                <span id="name-val">Saimon Ahmed</span>
                <button class="edit-btn" onclick="toggleEdit('name')"><i class="fas fa-edit"></i></button>
            </span>
        </div>
        <div class="info-item">
            <span class="info-label">Phone Number</span>
            <span class="info-value">
                <span id="phone-val">+880 17********</span>
                <button class="edit-btn" onclick="toggleEdit('phone')"><i class="fas fa-edit"></i></button>
            </span>
        </div>
            </div>
        </div>
    </div>

    <script>
        // Copy to clipboard
        function copyToClipboard(text, notify = true) {
            navigator.clipboard.writeText(text).then(() => {
                if(notify) showToast(`Copied!`);
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMsg');
            msg.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Inline Editing Logic
        function toggleEdit(field) {
            const valSpan = document.getElementById(`${field}-val`);
            const currentVal = valSpan.textContent;
            const editBtn = valSpan.nextElementSibling;
            
            // Change icon to done (checkmark)
            editBtn.innerHTML = '<i class="fas fa-check"></i>';
            editBtn.style.color = 'var(--neon-green)';
            
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentVal;
            input.className = 'edit-input';
            
            // Add input validation based on field type
            if (field === 'name') {
                input.placeholder = 'Enter English letters only';
                input.oninput = (e) => {
                    // Allow only English letters and spaces
                    e.target.value = e.target.value.replace(/[^a-zA-Z\s]/g, '');
                };
            } else if (field === 'phone') {
                input.placeholder = 'Enter numbers only';
                input.oninput = (e) => {
                    // Allow only numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                };
            }
            
            valSpan.innerHTML = '';
            valSpan.appendChild(input);
            input.focus();

            // Save on blur
            input.onblur = () => saveValue(field, input.value, editBtn);
            
            // Save on Enter key
            input.onkeydown = (e) => {
                if(e.key === 'Enter') saveValue(field, input.value, editBtn);
            };
            
            // Save on clicking the done icon
            editBtn.onclick = () => saveValue(field, input.value, editBtn);
        }

        function saveValue(field, newVal, editBtn) {
            const valSpan = document.getElementById(`${field}-val`);
            valSpan.textContent = newVal || `(empty)`;
            
            // Restore edit icon
            if (editBtn) {
                editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                editBtn.style.color = 'var(--text-dim)';
                editBtn.onclick = () => toggleEdit(field);
            }
            
            // Show beautiful toast message
            const messages = {
                'name': 'Profile updated successfully!',
                'phone': 'Phone number saved!',
                'address': 'Address updated!'
            };
            
            showToast(messages[field] || 'Updated successfully!');
        }

        // Ripple Effect
        document.querySelectorAll('.btn-ripple, .copy-btn').forEach(element => {
            element.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;

                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
</html>
