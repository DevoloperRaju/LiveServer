<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set PIN - IoLent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes inputPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    body { margin: 0; font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #0B111B !important; background-image: none !important;
           display: flex; align-items: center; justify-content: center; height: 100vh; color: #ffffff; }
    .pin-container { background: rgba(255, 255, 255, 0.05); padding: 30px 25px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
                     text-align: center; max-width: 320px; width: 100%; animation: fadeSlideUp 0.8s ease-out; }
    .pin-container h2 { margin-bottom: 10px; color: #00e676; font-weight: 800; }
    .pin-container p { color: #9ba1a6; }
    .pin-inputs { display: flex; justify-content: space-between; margin: 20px 0; }
    .pin-inputs input { width: 50px; height: 60px; font-size: 24px; text-align: center; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 10px; background: rgba(0, 0, 0, 0.2); color: #ffffff;
                        transition: all 0.3s; animation: inputPop 0.4s ease forwards; }
    .pin-inputs input:focus { border-color: #00e676; outline: none; transform: scale(1.1); box-shadow: 0 0 15px rgba(0, 230, 118, 0.2); background: rgba(0, 230, 118, 0.05); }
    .submit-btn { background: #00e676; color: #0B111B; padding: 12px 30px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
                  cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); width: 100%; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 230, 118, 0.5); }
    .footer { margin-top: 20px; font-size: 14px; color: #9ba1a6; }
  </style>
</head>
<body>
  <div class="pin-container">
    <h2>SetUp Your Pin</h2>
    <p>Please enter new 4-digit secure PIN</p>
    <div class="pin-inputs">
      <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]*" oninput="moveToNext(this, 0)">
      <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]*" oninput="moveToNext(this, 1)">
      <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]*" oninput="moveToNext(this, 2)">
      <input type="password" maxlength="1" inputmode="numeric" pattern="[0-9]*" oninput="moveToNext(this, 3)">
    </div>
    <button class="submit-btn" onclick="confirmPin()">Confirm</button>
    <div class="footer">IoLent - Everything is Money</div>
  </div>

  <script>
    const inputs = document.querySelectorAll('.pin-inputs input');

    function moveToNext(current, index) {
      // Allow only numeric input
      current.value = current.value.replace(/[^0-9]/g, '');
      
      if (current.value.length === 1 && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    }

    function confirmPin() {
      let pin = '';
      for (let input of inputs) {
        if (input.value === '') {
          alert("Please enter all 4 digits");
          return;
        }
        pin += input.value;
      }
      // Android JavaScript Interface কল
      if (typeof Android !== "undefined" && Android.setPIN) {
       var value = pin;  
        Android.setPIN(value);
      } else {
        alert("Android Interface not found!");
      }
    }
  </script>
</body>
</html>
