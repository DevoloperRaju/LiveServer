<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IoLent - Referral Setup</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-color: #0B111B;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #00e676;
            --primary-hover: #00c853;
            --text-main: #ffffff;
            --text-muted: #9ba1a6;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --danger: #ff5252;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color) !important;
            background-image: none !important;
            font-family: var(--font-family);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            /* Prevent overscroll/bounce effect in Webviews */
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Layout & Card */
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Input Validation Group */
        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
            text-align: center;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 230, 118, 0.05);
            box-shadow: 0 0 0 4px rgba(0, 230, 118, 0.1);
        }

        input.error {
            border-color: var(--danger);
            background: rgba(255, 82, 82, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 82, 82, 0.1);
            animation: shake 0.4s ease-in-out;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: normal;
        }

        /* Buttons */
        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s, box-shadow 0.2s;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-continue {
            background-color: var(--primary);
            color: #000;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.2);
        }

        .btn-continue:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.3);
        }

        .btn-skip {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-skip:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Loading Spinner */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(11, 17, 27, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(0, 230, 118, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        
        .loading-text {
            color: var(--primary);
            font-weight: 500;
            font-size: 14px;
        }

        /* Dialog/Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(11, 17, 27, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 24px;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            transform: scale(0.9) translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-icon {
            color: var(--danger);
            font-size: 32px;
            margin-bottom: 16px;
        }

        .modal-icon.icon-success {
            color: var(--primary);
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: var(--text-main);
            font-weight: 600;
        }

        .modal-message {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 10px;
        }

        .modal-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* Responsive */
        @media (min-width: 640px) {
            .container { padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Referral Code</h1>
        <p>Were you invited? Enter the referral code to link your account.</p>

        <div class="input-group">
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="referralCode" placeholder="Enter referral code (optional)" autocomplete="off" spellcheck="false" maxlength="10">
        </div>

        <button class="btn btn-continue" onclick="handleContinue()">Continue</button>
        <button class="btn btn-skip" onclick="handleSkip()">Skip</button>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Processing...</div>
    </div>

    <!-- Custom Dialog Modal -->
    <div id="dialogModal" class="modal">
        <div class="modal-content">
            <div id="modalIcon" class="modal-icon">⚠️</div>
            <h3 id="modalTitle" class="modal-title">Notice</h3>
            <p id="modalMessage" class="modal-message"></p>
            <button class="btn modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        let isProcessing = false;
        const referInput = document.getElementById('referralCode');

        // Input sanitization on type mapping - allow only numbers
        referInput.addEventListener('input', function(e) {
            this.classList.remove('error'); // Clear error style on typing
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Show/Hide Functions
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function showModal(title, message, isSuccess = false) {
            const modal = document.getElementById('dialogModal');
            const icon = document.getElementById('modalIcon');
            
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            
            if (isSuccess) {
                icon.textContent = "✅";
                icon.classList.add('icon-success');
            } else {
                icon.textContent = "⚠️";
                icon.classList.remove('icon-success');
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('dialogModal').classList.remove('active');
        }

        function triggerError(message) {
            referInput.classList.add('error');
            showModal("Invalid Code", message);
            referInput.focus();
        }

        // Logic Handlers
        function handleContinue() {
            if (isProcessing) return;
            
            // basic sanitize
            let code = referInput.value.trim();

            if (code.length > 0) {
                // Validation rules: must be a number and >= 10000
                const numValue = parseInt(code, 10);
                if (isNaN(numValue) || numValue < 10000) {
                    triggerError("Referral code must be a number not less than 10000.");
                    return;
                }
            } else {
                // Treated silently as skip if empty but user clicks continue
                code = "10000";
            }

            processCode(code);
        }

        function handleSkip() {
            if (isProcessing) return;
            processCode("10000");
        }

        function processCode(code) {
            isProcessing = true;
            showLoading();
            referInput.blur(); // dismiss keyboard

            // Simulate slight delay to render loading spinner properly before UI blocks via Android interface
            setTimeout(() => {
                try {
                    // Call the Android Webview Interface Method
                    if (typeof Android !== 'undefined' && Android.setReferralCode) {
                        // The WebView will handle routing after this natively
                        var value = code;  Android.setReferralCode(value);
                    } else {
                        // Fallback purely for debugging locally when not inside Android WebView
                        console.log("Sending referral code to Android:", code);
                        hideLoading();
                        showModal("Action Triggered", "Android interface is missing. Simulated sending code: " + code, true);
                        isProcessing = false;
                    }
                } catch (err) {
                    hideLoading();
                    showModal("System Error", "Could not connect to the device system. Try again.");
                    isProcessing = false;
                }
            }, 400); // 400ms delay provides a sleek transition
        }

        function handleResponse(responseString) {
            hideLoading();
            isProcessing = false;

            try {
                const data = JSON.parse(responseString);
                
                if (data.status === "error") {
                    let title = "Verification Failed";
                    let message = data.message || "An unknown error occurred";
                    showModal(title, message, false);
                } else if (data.status === "AccountSetup") {
                    window.location.href = "AccountSetup.html";
                } else if (data.status === "SetAddress") {
                    window.location.href = "AddressSet.html";
                } else if (data.status === "Dashboard") {
                    window.location.href = "user-dashboard.html";
                } else {
                    console.warn("Unknown response status:", data.status);
                }
            } catch (e) {
                console.error("Error parsing response:", e);
                showModal("System Error", "Invalid response from server.", false);
            }
        }
    </script>
</body>
</html>
