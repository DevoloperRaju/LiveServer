<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #f093fb;
            --text-color: #ffffff;
            --bg-color: #121212;
            --loader-size: 80px;
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Loading Container */
        .loading-container {
            text-align: center;
            z-index: 10;
        }

        /* Logo/Icon */
        .loader-logo {
            width: var(--loader-size);
            height: var(--loader-size);
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
            animation: spin 2s linear infinite;
        }

        .logo-circle::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--primary-color);
            border-right: 4px solid var(--secondary-color);
            animation: spin 1s linear infinite;
        }

        .logo-inner {
            width: 60%;
            height: 60%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            position: relative;
        }

        .logo-inner::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            background: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary-color);
        }

        /* Loading Text */
        .loading-text {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.8;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        /* Subtitle */
        .loading-subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Animated Dots */
        .loading-dots {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--primary-color);
            border-radius: 50%;
            margin-left: 10px;
            animation: bounce 1.4s ease-in-out infinite both;
        }

        .loading-dots::after {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--secondary-color);
            border-radius: 50%;
            margin-left: 5px;
            animation: bounce 1.4s ease-in-out 0.2s infinite both;
        }

        .loading-dots::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 5px;
            animation: bounce 1.4s ease-in-out 0.4s infinite both;
        }

        /* Branding Styles */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeIn 2s ease-in-out;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            margin-bottom: 15px;
            animation: pulse 2s infinite ease-in-out;
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-slogan {
            font-size: 1rem;
            color: var(--accent-color);
            letter-spacing: 1.5px;
            font-style: italic;
            opacity: 0.9;
        }

        /* Background Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: floatUp 6s linear infinite;
        }

        /* Progress Bar */
        .progress-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 40px auto;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            border-radius: 2px;
            animation: progress 3s ease-in-out infinite;
            box-shadow: 0 0 10px var(--primary-color);
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes progress {
            0% {
                width: 0%;
                background-position: 0 0;
            }
            50% {
                width: 70%;
                background-position: 100px 0;
            }
            100% {
                width: 100%;
                background-position: 200px 0;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .loader-logo {
                width: 60px;
                height: 60px;
            }
            
            .loading-text {
                font-size: 1.2rem;
            }
            
            .progress-container {
                width: 250px;
            }
        }

        @media (max-width: 480px) {
            .loader-logo {
                width: 50px;
                height: 50px;
            }
            
            .loading-text {
                font-size: 1rem;
            }
            
            .progress-container {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <div class="particles" id="particles"></div>

    <!-- Loading Content -->
    <div class="loading-container">
        
        <!-- Brand Intro -->
        <div class="brand-container">
            <img src="https://i.ibb.co.com/QjvffmCv/ic-launcher.png" alt="IoLent Logo" class="brand-logo">
            <h1 class="brand-name">IoLent</h1>
            <div class="brand-slogan">Everything Is Money</div>
        </div>

        <!-- Logo/Spinner -->
        <div class="loader-logo">
            <div class="logo-circle">
                <div class="logo-inner"></div>
            </div>
        </div>

        <!-- Loading Text -->
        <div class="loading-text">
            Loading
            <span class="loading-dots"></span>
        </div>

        <!-- Subtitle -->
        <div class="loading-subtitle">
            Please wait while we prepare your experience
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <script>
        // JavaScript for Loading Animation

        document.addEventListener('DOMContentLoaded', function() {
            // Create floating particles
            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                const particleCount = 20;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    // Random size between 2px and 6px
                    const size = Math.random() * 4 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    
                    // Random position
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    
                    // Random animation duration
                    const duration = Math.random() * 4 + 4;
                    particle.style.animationDuration = duration + 's';
                    
                    // Random delay
                    const delay = Math.random() * 5;
                    particle.style.animationDelay = delay + 's';
                    
                    particlesContainer.appendChild(particle);
                }
            }

            // Initialize particles
            createParticles();

            // Add some interactive effects
            document.addEventListener('mousemove', function(e) {
                const logo = document.querySelector('.loader-logo');
                const rect = logo.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Subtle movement on mouse move
                logo.style.transform = `translate(${(x - rect.width/2) * 0.02}px, ${(y - rect.height/2) * 0.02}px)`;
            });

            // Reset transform when mouse leaves
            document.addEventListener('mouseleave', function() {
                const logo = document.querySelector('.loader-logo');
                logo.style.transform = 'translate(0, 0)';
            });

            // Add click effect to the container
            document.querySelector('.loading-container').addEventListener('click', function() {
                const logo = document.querySelector('.logo-circle');
                logo.style.animationDuration = '0.5s';
                setTimeout(() => {
                    logo.style.animationDuration = '2s';
                }, 500);
            });
        });
    </script>
</body>
</html>
