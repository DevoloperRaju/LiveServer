<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoLent - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00e676;
            --secondary-color: #00c853;
            --accent-color: #00e676;
            --text-color: #ffffff;
            --light-text: #ffffff;
            --bg-color: #0B111B;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-radius: 12px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --transition-speed: 0.3s;
            --font-family-primary: 'Space Grotesk', sans-serif;
            --font-family-secondary: 'Inter', sans-serif;
        }

        /* Dark theme variables */
        :root[data-theme="dark"] {
            --primary-color: #00e676;
            --secondary-color: #00c853;
            --accent-color: #00e676;
            --text-color: #ffffff;
            --light-text: #ffffff;
            --bg-color: #0B111B;
            --card-bg: rgba(255, 255, 255, 0.05);
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-secondary);
            background-color: var(--bg-color) !important;
            background-image: none !important;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Background Elements - Removed for clean Deep Obsidian theme */

        /* Login Container */
        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container {
            position: relative;
            margin: 0 auto 20px;
            width: 100px;
            height: 100px;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: rgba(0, 230, 118, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: none;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .logo-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .logo-image {
            width: 60px;
            height: 60px;
            object-fit: contain;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .logo-circle:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .logo-circle:hover .logo-image {
            transform: scale(1.1);
        }

        /* Welcome Text */
        .welcome-text {
            font-family: var(--font-family-primary);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: slideInDown 0.8s ease-out 0.2s both;
        }

        .welcome-subtitle {
            font-family: var(--font-family-secondary);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        /* Form Styles */
        .login-form {
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-family: var(--font-family-secondary);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.2);
            transform: translateY(-2px);
        }

        /* Google Sign-In Button */
        .google-signin-container {
            margin-top: 30px;
        }

        .google-signin-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out 0.6s both;
            position: relative;
            overflow: hidden;
            color: #ffffff;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            background-color: rgba(0, 230, 118, 0.4);
            pointer-events: none;
        }

        .google-signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
            border-color: #c6c6c6;
        }

        .google-icon {
            width: 24px;
            height: 24px;
            position: relative;
        }

        .google-icon svg {
            width: 100%;
            height: 100%;
        }

        .google-text {
            font-family: var(--font-family-secondary);
            font-weight: 600;
            color: #ffffff;
            font-size: 1rem;
        }

        /* Alternative Options */
        .alternative-options {
            margin-top: 25px;
            text-align: center;
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signup-link {
            font-family: var(--font-family-secondary);
            font-size: 0.9rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px;
                max-width: 90%;
                margin: 20px;
            }
            
            .welcome-text {
                font-size: 1.5rem;
            }
            
            .logo-container {
                width: 80px;
                height: 80px;
            }
            
            .logo-image {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 25px;
                max-width: 95%;
            }
            
            .welcome-text {
                font-size: 1.2rem;
            }
            
            .logo-container {
                width: 70px;
                height: 70px;
            }
            
            .logo-image {
                width: 45px;
                height: 45px;
            }
        }

        /* Small Footer */
        .login-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            font-family: var(--font-family-secondary);
        }
        
        .login-footer span {
            font-weight: 500;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Background Elements Removed -->

    <!-- Login Container -->
    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-container">
                <div class="logo-circle">
                    <img id="logoImage" src="https://i.ibb.co.com/QjvffmCv/ic-launcher.png" alt="IoLent Logo" class="logo-image">
                </div>
            </div>
            
            <h1 class="welcome-text">Welcome Back</h1>
            <p class="welcome-subtitle">Sign in to continue to IoLent</p>
        </div>


        <!-- Google Sign-In -->
        <div class="google-signin-container">
            <button class="google-signin-btn" id="googleSignInBtn">
                <div class="google-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                </div>
                <span class="google-text">Sign in with Google</span>
            </button>
        </div>

        <!-- Professional Footer -->
        <div class="login-footer">
            &copy; 2026 <span>IoLent</span>. All rights reserved.
        </div>

    </div>

    <script>
        // JavaScript for Login Page

        document.addEventListener('DOMContentLoaded', function() {
            // Logo URL Input (for future server integration)
            const logoImage = document.getElementById('logoImage');
            
            // Google Sign-In Button
            const googleSignInBtn = document.getElementById('googleSignInBtn');
            
            googleSignInBtn.addEventListener('click', function(e) {
                // Ripple effect
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${x - size/2}px`;
                ripple.style.top = `${y - size/2}px`;
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);

                // Google Sign-In functionality - will be connected to server later
                console.log('Google Sign-In clicked - no action yet');
                
                // Add click animation
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });

            // Form Input Effects
            const formInputs = document.querySelectorAll('.form-input');
            
            formInputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                });
            });

            // Logo hover effects
            const logoCircle = document.querySelector('.logo-circle');
            if (logoCircle) {
                logoCircle.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.1) rotate(5deg)';
                });
                
                logoCircle.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1) rotate(0deg)';
                });
            }

            // Background animations removed for cleaner Deep Obsidian theme

            // Resize canvas on window resize
            window.addEventListener('resize', initCanvas);
        });
    </script>
</body>
</html>
