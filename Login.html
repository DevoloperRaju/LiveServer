<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoLent - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #f093fb;
            --text-color: #333;
            --light-text: #ffffff;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-radius: 12px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition-speed: 0.3s;
            --font-family-primary: 'Space Grotesk', sans-serif;
            --font-family-secondary: 'Inter', sans-serif;
        }

        /* Dark theme variables */
        :root[data-theme="dark"] {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --accent-color: #43e97b;
            --text-color: #e9ecef;
            --light-text: #121212;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-secondary);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Background Elements */
        .background-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .element {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .element-1 {
            width: 300px;
            height: 300px;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .element-2 {
            width: 250px;
            height: 250px;
            top: 70%;
            right: -10%;
            animation-delay: 1s;
        }

        .element-3 {
            width: 200px;
            height: 200px;
            bottom: -10%;
            left: 20%;
            animation-delay: 2s;
        }

        .element-4 {
            width: 150px;
            height: 150px;
            top: 30%;
            right: 10%;
            animation-delay: 3s;
        }

        /* Particles Background */
        #particles-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;

            opacity: 0.6;
        }

        /* Login Container */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container {
            position: relative;
            margin: 0 auto 20px;
            width: 100px;
            height: 100px;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .logo-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .logo-image {
            width: 60px;
            height: 60px;
            object-fit: contain;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .logo-circle:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .logo-circle:hover .logo-image {
            transform: scale(1.1);
        }

        /* Welcome Text */
        .welcome-text {
            font-family: var(--font-family-primary);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: slideInDown 0.8s ease-out 0.2s both;
        }

        .welcome-subtitle {
            font-family: var(--font-family-secondary);
            font-size: 0.9rem;
            color: #666;
            opacity: 0.8;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        /* Form Styles */
        .login-form {
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            font-family: var(--font-family-secondary);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        /* Google Sign-In Button */
        .google-signin-container {
            margin-top: 30px;
        }

        .google-signin-btn {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            border: 2px solid #dadce0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out 0.6s both;
            position: relative;
            overflow: hidden;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            background-color: rgba(102, 126, 234, 0.4);
            pointer-events: none;
        }

        .google-signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
            border-color: #c6c6c6;
        }

        .google-icon {
            width: 24px;
            height: 24px;
            position: relative;
        }

        .google-icon svg {
            width: 100%;
            height: 100%;
        }

        .google-text {
            font-family: var(--font-family-secondary);
            font-weight: 600;
            color: #333;
            font-size: 1rem;
        }

        /* Alternative Options */
        .alternative-options {
            margin-top: 25px;
            text-align: center;
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            font-size: 0.8rem;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .signup-link {
            font-family: var(--font-family-secondary);
            font-size: 0.9rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px;
                max-width: 90%;
                margin: 20px;
            }
            
            .welcome-text {
                font-size: 1.5rem;
            }
            
            .logo-container {
                width: 80px;
                height: 80px;
            }
            
            .logo-image {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 25px;
                max-width: 95%;
            }
            
            .welcome-text {
                font-size: 1.2rem;
            }
            
            .logo-container {
                width: 70px;
                height: 70px;
            }
            
            .logo-image {
                width: 45px;
                height: 45px;
            }
        }

        /* Small Footer */
        .login-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            font-family: var(--font-family-secondary);
        }
        
        .login-footer span {
            font-weight: 500;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="background-elements">
        <div class="element element-1"></div>
        <div class="element element-2"></div>
        <div class="element element-3"></div>
        <div class="element element-4"></div>
    </div>

    <!-- Live Mining Particles Background -->
    <canvas id="particles-bg"></canvas>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-container">
                <div class="logo-circle">
                    <img id="logoImage" src="https://i.ibb.co.com/QjvffmCv/ic-launcher.png" alt="IoLent Logo" class="logo-image">
                </div>
            </div>
            
            <h1 class="welcome-text">Welcome Back</h1>
            <p class="welcome-subtitle">Sign in to continue to IoLent</p>
        </div>


        <!-- Google Sign-In -->
        <div class="google-signin-container">
            <button class="google-signin-btn" id="googleSignInBtn">
                <div class="google-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                </div>
                <span class="google-text">Sign in with Google</span>
            </button>
        </div>

        <!-- Professional Footer -->
        <div class="login-footer">
            &copy; 2026 <span>IoLent</span>. All rights reserved.
        </div>

    </div>

    <script>
        // JavaScript for Login Page

        document.addEventListener('DOMContentLoaded', function() {
            // Logo URL Input (for future server integration)
            const logoImage = document.getElementById('logoImage');
            
            // Google Sign-In Button
            const googleSignInBtn = document.getElementById('googleSignInBtn');
            
            googleSignInBtn.addEventListener('click', function(e) {
                // Ripple effect
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${x - size/2}px`;
                ripple.style.top = `${y - size/2}px`;
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);

                // Google Sign-In functionality - will be connected to server later
                console.log('Google Sign-In clicked - no action yet');
                
                // Add click animation
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });

            // Form Input Effects
            const formInputs = document.querySelectorAll('.form-input');
            
            formInputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                });
            });

            // Logo hover effects
            const logoCircle = document.querySelector('.logo-circle');
            if (logoCircle) {
                logoCircle.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.1) rotate(5deg)';
                });
                
                logoCircle.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1) rotate(0deg)';
                });
            }

            // Parallax effect for background elements
            window.addEventListener('mousemove', function(e) {
                const elements = document.querySelectorAll('.element');
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                elements.forEach((element, index) => {
                    const speed = 0.5 + (index * 0.1);
                    const xPos = (x - 0.5) * speed * 50;
                    const yPos = (y - 0.5) * speed * 50;
                    
                    element.style.transform = `translate(${xPos}px, ${yPos}px)`;
                });
            });

            // Add click animation to the entire container
            document.querySelector('.login-container').addEventListener('click', function(e) {
                if (e.target.closest('.google-signin-btn')) return;
                
                this.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });

            // Live Mining Particles Background Animation (Blockchain Nodes/Data Flow)
            const canvas = document.getElementById('particles-bg');
            const ctx = canvas.getContext('2d');
            let width, height, particles;

            function initCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                particles = [];
                
                // Create particles
                const numParticles = Math.min(Math.floor(width * height / 15000), 100);
                for (let i = 0; i < numParticles; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: (Math.random() - 0.5) * 1.5,
                        radius: Math.random() * 2 + 1
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1;

                // Update and draw particles
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];

                    // Movement
                    p.x += p.vx;
                    p.y += p.vy;

                    // Bounce off edges
                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                    // Draw dot
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Connect drawing lines
                    for (let j = i + 1; j < particles.length; j++) {
                        let p2 = particles[j];
                        let dx = p.x - p2.x;
                        let dy = p.y - p2.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 150) {
                            ctx.globalAlpha = 1 - (dist / 150); // Fade out lines as they get further
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1; // Reset alpha
                requestAnimationFrame(drawParticles);
            }

            // Start animation
            initCanvas();
            drawParticles();

            // Resize canvas on window resize
            window.addEventListener('resize', initCanvas);
        });
    </script>
</body>
</html>
