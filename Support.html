<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center - IoLent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #f093fb;
            --text-color: #333;
            --light-text: #ffffff;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-radius: 12px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition-speed: 0.3s;
            --font-family-primary: 'Space Grotesk', sans-serif;
            --font-family-secondary: 'Inter', sans-serif;
        }

        /* Dark theme variables */
        :root[data-theme="dark"] {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --accent-color: #43e97b;
            --text-color: #e9ecef;
            --light-text: #121212;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-secondary);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        /* Background Elements */
        .background-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .element {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .element-1 {
            width: 300px;
            height: 300px;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .element-2 {
            width: 250px;
            height: 250px;
            top: 70%;
            right: -10%;
            animation-delay: 1s;
        }

        .element-3 {
            width: 200px;
            height: 200px;
            bottom: -10%;
            left: 20%;
            animation-delay: 2s;
        }

        .element-4 {
            width: 150px;
            height: 150px;
            top: 30%;
            right: 10%;
            animation-delay: 3s;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: var(--font-family-primary);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: slideInDown 0.8s ease-out;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            animation: fadeIn 0.8s ease-out 0.2s both;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }


        /* Content Sections */
        .content-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: var(--box-shadow);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.8s ease-out;
        }

        .section-title {
            font-family: var(--font-family-primary);
            font-size: 1.5rem;
            color: var(--text-color);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title i {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        /* Contact Form */
        .contact-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: var(--primary-color);
            font-size: 1rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-family: var(--font-family-secondary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fff;
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            grid-column: 1 / -1;
            resize: vertical;
            min-height: 120px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
        }

        .priority-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .priority-low { background: #e8f5e9; color: #2e7d32; }
        .priority-medium { background: #fff3e0; color: #ef6c00; }
        .priority-high { background: #ffebee; color: #c62828; }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 15px;
            border-radius: 12px;
            font-family: var(--font-family-secondary);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            text-align: center;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:hover {
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
            transform: translateY(-3px);
        }

        .btn-chat {
            background: #fff;
            color: #666;
            border-color: #666;
        }

        .btn-chat:hover {
            background: #f8f9fa;
            color: #333;
            border-color: #333;
        }


        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }
            
            .search-container {
                padding: 20px;
            }
            
            .search-input {
                min-width: 100%;
            }
            
            .contact-form {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .category-card {
                padding: 20px;
            }
            
            .category-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="background-elements">
        <div class="element element-1"></div>
        <div class="element element-2"></div>
        <div class="element element-3"></div>
        <div class="element element-4"></div>
    </div>

    <!-- Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Support Center</h1>
            <p>We're here to help you succeed with IoLent. Find answers, get help, and connect with our team.</p>
        </div>


        <!-- Contact Form Section -->
        <div class="content-section" id="contact-support">
            <h3 class="section-title">
                <i class="fas fa-envelope"></i> Contact Support
            </h3>
            <form id="supportForm">
                <div class="contact-form">
                    <div class="form-group">
                        <label class="form-label" for="fullName">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <input type="text" id="fullName" name="fullName" class="form-input" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="your.email@example.com" required>
                    </div>

                    <div class="form-group form-textarea">
                        <label class="form-label" for="message">
                            <i class="fas fa-comment"></i> Describe Your Issue
                        </label>
                        <textarea id="message" name="message" class="form-input" rows="5" placeholder="Please provide details about your issue or question..." required></textarea>
                    </div>
                </div>

                <div class="form-row">
                    <span style="color: #666; font-size: 0.9rem;">Estimated response time: 24 hours</span>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="action-btn btn-submit">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </div>
            </form>
        </div>

        <!-- Social Icons Section -->
        <div class="content-section" style="text-align: center; margin-top: 40px;">
            <h3 class="section-title" style="justify-content: center;">
                <i class="fas fa-share-alt"></i> Connect With Us
            </h3>
            <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px;">
                <a href="#" class="social-icon" style="color: #1877F2; font-size: 2rem; transition: transform 0.3s ease;">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="#" class="social-icon" style="color: #25D366; font-size: 2rem; transition: transform 0.3s ease;">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="#" class="social-icon" style="color: #E4405F; font-size: 2rem; transition: transform 0.3s ease;">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="#" class="social-icon" style="color: #0088cc; font-size: 2rem; transition: transform 0.3s ease;">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="#" class="social-icon" style="color: #FF0000; font-size: 2rem; transition: transform 0.3s ease;">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>


    <script>
        // JavaScript for Support Page

        document.addEventListener('DOMContentLoaded', function() {
            const supportForm = document.getElementById('supportForm');

            // Form Submission Handler
            supportForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Get form data
                const formData = new FormData(supportForm);
                const data = {};
                
                formData.forEach((value, key) => {
                    data[key] = value;
                });

                // Validate form
                if (!data.fullName || !data.email || !data.message) {
                    alert('Please fill in all required fields.');
                    return;
                }

                // Validate email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(data.email)) {
                    alert('Please enter a valid email address.');
                    return;
                }

                // Show success message
                alert('Thank you for contacting our support team! We have received your message and will respond within 24 hours. You will receive a confirmation email shortly.');
                
                // Reset form
                supportForm.reset();
            });

            // Parallax effect for background elements
            window.addEventListener('mousemove', function(e) {
                const elements = document.querySelectorAll('.element');
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                elements.forEach((element, index) => {
                    const speed = 0.5 + (index * 0.1);
                    const xPos = (x - 0.5) * speed * 50;
                    const yPos = (y - 0.5) * speed * 50;
                    
                    element.style.transform = `translate(${xPos}px, ${yPos}px)`;
                });
            });

            // Form input animations
            const formInputs = document.querySelectorAll('.form-input, .form-select');
            formInputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                    this.parentElement.style.transition = 'transform 0.3s ease';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                });
            });

        });
    </script>
</body>
</html>
